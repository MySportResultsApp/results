<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sport tracker</title>
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #161a24;
      --card: #1e2330;
      --border: #2a3045;
      --accent: #3b82f6;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #f59e0b;
      --text: #e2e8f0;
      --muted: #64748b;
      --rangers: #1a3a6b;
      --liverpool: #c8102e;
      --lakers: #552583;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 24px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    header h1 span { color: var(--accent); }
    #last-updated {
      font-size: 0.8rem;
      color: var(--muted);
    }
    .refresh-btn {
      background: var(--accent);
      border: none;
      color: #fff;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      margin-left: 12px;
    }
    .refresh-btn:hover { background: #2563eb; }

    .teams-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }
    .team-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .team-header {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .team-logo { width: 40px; height: 40px; border-radius: 50%; object-fit: contain; background: rgba(255,255,255,0.1); padding: 4px; }
    .team-header h2 { font-size: 1.1rem; font-weight: 700; }
    .team-header .league { font-size: 0.75rem; color: var(--muted); }
    .rangers-header { background: linear-gradient(135deg, var(--rangers), #0d2448); }
    .liverpool-header { background: linear-gradient(135deg, var(--liverpool), #8b0000); }
    .lakers-header { background: linear-gradient(135deg, var(--lakers), #f9a01b22); border-top: 3px solid #f9a01b; }

    .team-body { padding: 16px 20px; }

    .result-box {
      background: var(--surface);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 14px;
    }
    .result-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .result-teams {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .result-team { font-size: 0.9rem; font-weight: 600; flex: 1; }
    .result-team.right { text-align: right; }
    .result-score {
      background: var(--bg);
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 1.2rem;
      font-weight: 700;
      text-align: center;
      min-width: 80px;
    }
    .result-meta { font-size: 0.7rem; color: var(--muted); margin-top: 6px; text-align: center; }

    .fixture-box {
      background: var(--surface);
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .fixture-info { font-size: 0.85rem; }
    .fixture-info .vs { color: var(--muted); font-size: 0.75rem; }
    .fixture-date { font-size: 0.75rem; color: var(--accent); text-align: right; }

    .form-row {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-bottom: 14px;
    }
    .form-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-right: 4px; }
    .form-dot {
      width: 26px; height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 700;
    }
    .form-dot.W { background: var(--green); color: #000; }
    .form-dot.L { background: var(--red); color: #fff; }
    .form-dot.D { background: var(--yellow); color: #000; }

    .standings-mini {
      font-size: 0.8rem;
      color: var(--muted);
    }
    .standings-mini strong { color: var(--text); }

    .section-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title .badge {
      background: var(--accent);
      color: #fff;
      font-size: 0.65rem;
      padding: 2px 7px;
      border-radius: 10px;
      font-weight: 600;
    }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
      margin-bottom: 32px;
    }

    .loading {
      color: var(--muted);
      font-size: 0.85rem;
      padding: 20px 0;
      text-align: center;
    }
    .error { color: var(--red); font-size: 0.8rem; padding: 8px 0; }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.75rem;
      margin-top: 32px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    @media (max-width: 768px) {
      body { padding: 16px; }
      .teams-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <h1>Sport <span>tracker</span></h1>
  <div style="display:flex;align-items:center;gap:8px;">
    <span id="last-updated">Loading...</span>
    <button class="refresh-btn" onclick="loadAll()">↻ Refresh</button>
  </div>
</header>

</html>
