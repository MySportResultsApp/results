<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sport tracker - News</title>

  <style>
    :root {
      --bg: #0d0f14;
      --surface: #161a24;
      --card: #1e2330;
      --border: #2a3045;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --text: #e2e8f0;
      --muted: #64748b;
      --rangers: #1a3a6b;
      --liverpool: #c8102e;
      --lakers: #552583;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 24px;
    }

    .page-wrap {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 20px;
      flex-wrap: wrap;
    }

    h1 span { color: var(--accent); }

    .top-nav {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }

    .nav-link {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
    }

    .nav-link.active {
      background: var(--accent);
      border-color: var(--accent);
    }

    .section-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }

    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 16px;
    }

    .news-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .news-img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      background: #000;
    }

    .news-body {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .news-title {
      font-size: 0.9rem;
      font-weight: 600;
      line-height: 1.3;
    }

    .news-title a {
      color: var(--text);
      text-decoration: none;
    }

    .news-title a:hover {
      color: var(--accent);
    }

    .news-meta {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .loading, .error {
      text-align: center;
      padding: 20px;
      color: var(--muted);
    }

    .error { color: #ef4444; }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.75rem;
      margin-top: 32px;
      border-top: 1px solid var(--border);
      padding-top: 20px;
    }
  </style>
</head>

<body>
<div class="page-wrap">

<header>
  <h1>Sport <span>tracker</span></h1>
</header>

<nav class="top-nav">
  <a class="nav-link" href="index.html">Overview</a>
  <a class="nav-link active" href="standings.html">News</a>
  <a class="nav-link" href="fixtures.html">Fixtures</a>
</nav>

<div class="section-title">Latest Sports News</div>

<div id="news-grid" class="news-grid">
  <div class="loading">Loading news...</div>
</div>

<footer>
</footer>

</div>

<script>
const ESPN = 'https://site.api.espn.com/apis/site/v2/sports';

const SOURCES = [
  { sport: 'soccer', league: 'eng.1' },
  { sport: 'soccer', league: 'sco.1' },
  { sport: 'basketball', league: 'nba' }
];

async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error('error');
  return r.json();
}

function timeAgo(dateStr) {
  const d = new Date(dateStr);
  const diff = (Date.now() - d) / 1000;

  if (diff < 3600) return Math.round(diff/60) + 'm ago';
  if (diff < 86400) return Math.round(diff/3600) + 'h ago';
  return d.toLocaleDateString();
}

async function loadNews() {
  const grid = document.getElementById('news-grid');
  let items = [];

  await Promise.allSettled(SOURCES.map(async s => {
    try {
      const data = await fetchJSON(`${ESPN}/${s.sport}/${s.league}/news`);
      const articles = data.articles || [];

      for (const a of articles.slice(0, 5)) {
        items.push({
          title: a.headline,
          url: a.links?.web?.href,
          img: a.images?.[0]?.url,
          time: a.published
        });
      }
    } catch(e){}
  }));

  if (!items.length) {
    grid.innerHTML = '<div class="error">No news available</div>';
    return;
  }

  items.sort((a,b) => new Date(b.time) - new Date(a.time));

  grid.innerHTML = items.slice(0, 15).map(n => `
    <div class="news-card">
      ${n.img ? `<img class="news-img" src="${n.img}">` : ''}
      <div class="news-body">
        <div class="news-title">
          <a href="${n.url}" target="_blank">${n.title}</a>
        </div>
        <div class="news-meta">${timeAgo(n.time)}</div>
      </div>
    </div>
  `).join('');
}

loadNews();
setInterval(loadNews, 5 * 60 * 1000);
</script>

</body>
</html>
